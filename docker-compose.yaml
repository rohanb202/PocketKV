version: "3.9"

services:
  node1:
    image: pocketkv
    command: ./node
    environment:
      NODE_ID: node1
      NODE_ADDRESS: ":8081"

  node2:
    image: pocketkv
    command: ./node
    environment:
      NODE_ID: node2
      NODE_ADDRESS: ":8082"

  node3:
    image: pocketkv
    command: ./node
    environment:
      NODE_ID: node3
      NODE_ADDRESS: ":8083"

  router:
    image: pocketkv
    command: ./router
    depends_on:
      - node1
      - node2
      - node3
    ports:
      - "8080:8080"
    environment:
      ROUTER_PORT: "8080"
      NODES: node1:8081,node2:8082,node3:8083